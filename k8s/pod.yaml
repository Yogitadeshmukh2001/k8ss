apiVersion: v1
kind: Pod
metadata:
  name: myapp
  labels:
    app: my1stapp
spec:
  containers:
  - name: myapp
    image: yogitadeshmukh/batch23:httpd-v1

    resources:
      requests:
        memory: "64Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    ports:
      - containerPort: 80
