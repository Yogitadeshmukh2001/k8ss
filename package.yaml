- name: package installation
  hosts: all
  become: true
  tasks:
    - name: install httpd
      package:
        name: httpd
        state: latest
        ignore_errors: true
        when: ansible_os_family == "RedHat"
    - name: install apache2
      package:
        name: apache2
        state: latest
        
        when: ansible_os_family == "Debian"
