apiVersion: v1
kind: Pod
metadata:
  name: my1stapp
  labels:
    app: my1stapp
spec:
  containers:
  - name: my1stapp
    namespace: database
    image: yogitadeshmukh/batch23:httpd-v1

    resources:
      
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: my1stapp
spec:
  type: NodePort
  selector:
    app: my1stapp
  ports:
    - port: 80
      targetPort: 8080 
---
apiVersion: v1
kind: Namespace
metadata:
  name: database
